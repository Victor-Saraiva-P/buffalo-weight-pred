model_configs:
  cnn_mask_stretch_64_augmented:
    model: cnn_mask
    params:
      epochs: 220
      batch_size: 16
      learning_rate: 0.0005
      image_size: 64
      resize_mode: stretch
      random_state: 42
      weight_decay: 0.0001
      patience: 30
      validation_fraction: 0.2
      augment: true
  cnn_mask_letterbox_64_augmented:
    model: cnn_mask
    params:
      epochs: 220
      batch_size: 16
      learning_rate: 0.0005
      image_size: 64
      resize_mode: letterbox
      random_state: 42
      weight_decay: 0.0001
      patience: 30
      validation_fraction: 0.2
      augment: true
  cnn_mask_letterbox_128_no_augmentation:
    model: cnn_mask
    params:
      epochs: 220
      batch_size: 16
      learning_rate: 0.0005
      image_size: 128
      resize_mode: letterbox
      random_state: 42
      weight_decay: 0.0001
      patience: 30
      validation_fraction: 0.2
      augment: false
  cnn_mask_letterbox_128_augmented:
    model: cnn_mask
    params:
      epochs: 220
      batch_size: 16
      learning_rate: 0.0005
      image_size: 128
      resize_mode: letterbox
      random_state: 42
      weight_decay: 0.0001
      patience: 30
      validation_fraction: 0.2
      augment: true
  pca_svr_mask_baseline:
    model: pca_svr_mask
    params:
      image_size: 128
      resize_mode: letterbox
      n_components: 32
      random_state: 42
      c: 10.0
      epsilon: 0.1
      gamma: scale
