name: baseline_features

data:
  index_path: data/indice.xlsx
  masks_dir: data/conjunto-de-mascaras
  file_name_column: Nome do arquivo
  farm_column: Fazenda
  target_column: Peso
  tag_column: Tags

output:
  features_index_path: generated/baseline_features.csv
  columns:
    - file_name
    - farm
    - weight
    - tag
    - area
    - perimeter
    - solidity
    - circularity
    - equivalent_diameter
    - hu_moment_1
    - hu_moment_2

split:
  k: 5
  random_state: 42
  weight_category_count: 10
  split_path: generated/splits/baseline_kfold_split.csv
  distribution_plot_data_path: generated/splits/baseline_weight_categories.csv
  distribution_plot_path: generated/splits/baseline_weight_categories.png

training:
  split_path: generated/splits/baseline_kfold_split.csv
  output_dir: generated/train
  model_configs:
    random_forest_baseline:
      model: random_forest
      params:
        n_estimators: 200
        random_state: 42
    xgboost_baseline:
      model: xgboost
      params:
        n_estimators: 200
        random_state: 42
        learning_rate: 0.05
        max_depth: 3
  feature_columns:
    - area
    - perimeter
    - solidity
    - circularity
    - equivalent_diameter
    - hu_moment_1
    - hu_moment_2
