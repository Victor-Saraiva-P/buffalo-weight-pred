model_configs:
  random_forest_reduced_features:
    model: random_forest
    params:
      n_estimators: 500
      random_state: 42
      min_samples_leaf: 2
      max_features: 1.0
  extra_trees_reduced_features:
    model: extra_trees
    params:
      n_estimators: 500
      random_state: 42
      min_samples_leaf: 2
      max_features: 1.0

feature_columns:
  - area
  - solidity
  - circularity
  - aspect_ratio
  - extent
  - hu_moment_1
  - hu_moment_2
