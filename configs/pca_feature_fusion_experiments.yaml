model_configs:
  fusion_pca8_letterbox_leaf2:
    model: pca_feature_fusion
    params: &fusion_defaults
      image_size: 128
      resize_mode: letterbox
      n_components: 8
      n_estimators: 500
      random_state: 42
      min_samples_leaf: 2
      max_features: 1.0
  fusion_pca16_letterbox_leaf2:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      n_components: 16
  fusion_pca32_letterbox_leaf2:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      n_components: 32
  fusion_pca48_letterbox_leaf2:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      n_components: 48
  fusion_pca24_letterbox_leaf1:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      n_components: 24
      min_samples_leaf: 1
  fusion_pca24_letterbox_leaf4:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      n_components: 24
      min_samples_leaf: 4
  fusion_pca24_stretch_leaf2:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      n_components: 24
      resize_mode: stretch
  fusion_64_pca24_letterbox_leaf2:
    model: pca_feature_fusion
    params:
      <<: *fusion_defaults
      image_size: 64

feature_columns:
  - area
  - perimeter
  - solidity
  - circularity
  - equivalent_diameter
  - bbox_width
  - bbox_height
  - bbox_area
  - aspect_ratio
  - extent
  - convex_area
  - convexity
  - major_axis_length
  - minor_axis_length
  - hu_moment_1
  - hu_moment_2
